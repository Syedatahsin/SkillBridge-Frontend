<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="8" ry="8" fill="url(#grad)" />
  <!-- Graduation cap: board -->
  <polygon points="16,7 27,12.5 16,18 5,12.5" fill="white" opacity="0.95"/>
  <!-- Graduation cap: top button -->
  <circle cx="16" cy="7" r="1.5" fill="white" opacity="0.95"/>
  <!-- Graduation cap: tassel string -->
  <line x1="27" y1="12.5" x2="27" y2="20" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
  <!-- Graduation cap: tassel ball -->
  <circle cx="27" cy="21.5" r="2" fill="white" opacity="0.85"/>
  <!-- Graduation cap: body/mortarboard base -->
  <path d="M10,15.5 L10,22 Q16,25 22,22 L22,15.5" fill="white" opacity="0.75"/>
</svg>
